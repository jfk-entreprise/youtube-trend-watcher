name: YouTube Trend Watcher — Pipeline 6h

on:
  schedule:
    - cron: '0 */6 * * *'   # Toutes les 6 heures (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Déclenchement manuel depuis l'interface GitHub

env:
  PYTHONIOENCODING: utf-8
  # Sprint 34 : scripts/test_agents.py collecte désormais les deux marchés
  # (FR + US) dans le même run via son dict MARKETS interne — plus besoin de
  # YOUTUBE_REGION_CODE/YOUTUBE_LANGUAGE au niveau du workflow.

jobs:
  pipeline:
    name: Collect → Analyze → Report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Les secrets Supabase sont déclarés au niveau du job pour être hérités
    # par toutes les étapes. Sans cela, build_storage() ignore Supabase dans
    # les étapes qui n'ont pas leur propre bloc env: (run_virality, generate_report).
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      # ── Environnement ──────────────────────────────────────────────────────────

      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installation des dépendances
        run: |
          echo "▶ Installation des dépendances Python"
          pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          echo "✅ Dépendances installées"

      - name: Validation des secrets requis
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          echo "▶ Vérification des variables d'environnement"
          if [ -z "${YOUTUBE_API_KEY}" ]; then
            echo "::error::YOUTUBE_API_KEY non configuré dans les secrets GitHub."
            echo "::error::Consultez docs/github-actions-guide.md pour la procédure."
            exit 1
          fi
          echo "✅ YOUTUBE_API_KEY : présent"
          SUPABASE_STATUS="absent (mode CSV uniquement)"
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then SUPABASE_STATUS="présent"; fi
          echo "ℹ️  SUPABASE_URL    : ${SUPABASE_STATUS}"

      # ── Collecte ───────────────────────────────────────────────────────────────

      - name: "Étape 1/3 — Collecte multi-agents (test_agents.py)"
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          echo "▶ Lancement de la collecte YouTube (KeywordAgent + TrendingAgent)"
          python scripts/test_agents.py
          echo "✅ Collecte terminée"

      # ── Analyse ────────────────────────────────────────────────────────────────

      - name: "Étape 2/3 — Moteur de viralité (run_virality.py)"
        run: |
          echo "▶ Analyse des snapshots par le Virality Engine v2"
          python scripts/run_virality.py
          echo "✅ Analyse de viralité terminée"

      # ── Rapport ────────────────────────────────────────────────────────────────

      - name: "Étape 3/3 — Rapport de synthèse Markdown (generate_report.py)"
        run: |
          echo "▶ Génération du rapport Markdown horodaté"
          python scripts/generate_report.py
          echo "✅ Rapport généré"
          echo ""
          echo "Fichiers présents dans reports/ :"
          ls -lh reports/ 2>/dev/null || echo "(répertoire vide)"

      # ── Artefact ───────────────────────────────────────────────────────────────

      - name: Sauvegarde des rapports en artefacts GitHub Actions
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trend-reports-run${{ github.run_number }}-${{ github.run_id }}
          path: reports/
          retention-days: 30
          if-no-files-found: warn
